name: Update Stats Cards

on:
  schedule:
    - cron: "30 0 * * *" # runs daily, offset from the snake workflow
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/stats.yml"

permissions:
  contents: write

env:
  THEME: bg_color=0D1117&title_color=8B5CF6&icon_color=22D3EE&text_color=C9D1D9&border_color=30363D

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&rank_icon=github&${{ env.THEME }}
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&${{ env.THEME }}
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Portfolio pin
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Portfolio&${{ env.THEME }}
          path: profile/pin-portfolio.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Resume-Screening pin
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Resume-Screening&${{ env.THEME }}
          path: profile/pin-resume-screening.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Media-Player-System pin
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Media-Player-System&${{ env.THEME }}
          path: profile/pin-media-player.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Ice-Cream-Project pin
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Ice-Cream-Project&${{ env.THEME }}
          path: profile/pin-ice-cream.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Chatbot pin
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Chatbot&${{ env.THEME }}
          path: profile/pin-chatbot.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Coin-Collector pin
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Coin-Collector-Assembly-Language&${{ env.THEME }}
          path: profile/pin-coin-collector.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh trophies SVG
        run: |
          curl -fsSL "https://trophy.ryglcloud.net/?username=${{ github.repository_owner }}&theme=onedark&no-frame=true&column=7&margin-w=12&margin-h=12" \
            -o profile/trophies.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stats cards" || exit 0
          git push
